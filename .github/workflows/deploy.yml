name: Deploy to PythonAnywhere

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PA_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan ssh.pythonanywhere.com >> ~/.ssh/known_hosts
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Deploy via SSH
        run: |
          echo "🚀 Deploying to PythonAnywhere..."

          ssh -i ~/.ssh/id_ed25519 ${{ secrets.PA_USERNAME }}@ssh.pythonanywhere.com << 'ENDSSH'
            cd /home/${{ secrets.PA_USERNAME }}/shadow-hockey-league_v2
            
            echo "📦 Pulling latest changes..."
            git pull origin main
            
            echo "🔧 Installing dependencies..."
            source /home/${{ secrets.PA_USERNAME }}/.venvs/shadow-hockey-league_v2/bin/activate
            pip install -r requirements.txt --quiet
            
            echo "🔄 Reloading web app..."
            touch /var/www/${{ secrets.PA_USERNAME }}_pythonanywhere_com_wsgi.py
            
            echo "✅ Deployment completed!"
          ENDSSH

          echo "✅ Deploy successful!"
