name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    # Add Redis service for Prod-Like testing
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests (Prod-Like with Redis & No Rate Limits)
        env:
          TESTING: "1"
          FLASK_ENV: "testing"
          CACHE_TYPE: "RedisCache"
          REDIS_HOST: "localhost"
        run: |
          # Using pytest for speed and better reporting
          python -m pytest tests/ -v --tb=short

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Prepare deploy script on server
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -o ConnectTimeout=10 \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
            set -e
            cd /home/shleague/shadow-hockey-league_v2

            # Если скрипта деплоя нет, создаем его.
            if [ ! -f scripts/deploy.sh ]; then
              mkdir -p scripts
              
              # Пытаемся скачать шаблон напрямую с GitHub (API), чтобы не ломать git статус локальных файлов
              # Замените amatjkay/shadow-hockey-league_v2 на свой репозиторий, если нужно
              curl -sfL "https://raw.githubusercontent.com/amatjkay/shadow-hockey-league_v2/main/scripts/deploy.sh.template" -o scripts/deploy.sh || true
              
              # Если скачивание не вышло (например, приватный репо), пробуем через git
              if [ ! -s scripts/deploy.sh ]; then
                git fetch origin main
                git checkout origin/main -- scripts/deploy.sh.template 2>/dev/null || true
                if [ -f scripts/deploy.sh.template ]; then
                  cp scripts/deploy.sh.template scripts/deploy.sh
                fi
              fi
              
              chmod +x scripts/deploy.sh
              
              if [ -f scripts/deploy.sh ]; then
                echo "Deploy script created."
              else
                echo "ERROR: Could not create deploy script!"
                exit 1
              fi
            else
              chmod +x scripts/deploy.sh
            fi
            EOF

      - name: Run deploy script on server
        run: |
          # Сначала подготовим окружение: создадим deploy.sh из шаблона, если его нет
          ssh -i ~/.ssh/id_ed25519 \
            -o ConnectTimeout=10 \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} << 'ENDSSH'
            set -e
            cd /home/shleague/shadow-hockey-league_v2

            # Если скрипта нет (первый запуск), копируем из шаблона
            if [ ! -f scripts/deploy.sh ]; then
              echo "Creating deploy.sh from template..."
              cp scripts/deploy.sh.template scripts/deploy.sh
              chmod +x scripts/deploy.sh
            fi
          ENDSSH

          # Запускаем сам деплой
          ssh -i ~/.ssh/id_ed25519 \
            -o ConnectTimeout=10 \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} \
            "cd /home/shleague/shadow-hockey-league_v2 && bash ./scripts/deploy.sh 2>&1"

      - name: Deployment result
        if: always()
        run: |
          echo "Deploy step completed at $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Actor: ${{ github.actor }}"
