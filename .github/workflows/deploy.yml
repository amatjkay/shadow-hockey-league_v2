name: Deploy to PythonAnywhere (Manual Trigger)

# ⚠️ Примечание: На бесплатном тарифе PythonAnywhere API и SSH недоступны.
# Используйте Scheduled Tasks или ручной деплой через консоль.
# Этот workflow может работать только на платном тарифе.

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Notify
        run: |
          echo "⚠️ PythonAnywhere бесплатный тариф не поддерживает API для деплоя."
          echo ""
          echo "Используйте один из вариантов:"
          echo "1. Scheduled Tasks на PythonAnywhere (см. docs/DEPLOY.md)"
          echo "2. Ручной деплой через Bash консоль:"
          echo "   cd /home/amatjkay/shadow-hockey-league_v2 && git pull && source /home/amatjkay/.venvs/shadow-hockey-league_v2/bin/activate && pip install -r requirements.txt --quiet && touch /var/www/amatjkay_pythonanywhere_com_wsgi.py"
          echo ""
          echo "3. Платный тариф PythonAnywhere для автоматического деплоя"
