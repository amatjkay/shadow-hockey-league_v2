name: Deploy to PythonAnywhere

on:
  push:
    branches: [main]
  workflow_dispatch: # Ручной запуск из UI GitHub

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger PythonAnywhere reload
        run: |
          echo "🚀 Triggering reload on PythonAnywhere..."

          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            "https://www.pythonanywhere.com/api/v0/user/${{ secrets.PA_USERNAME }}/webapps/${{ secrets.PA_DOMAIN }}/reload/" \
            -H "Authorization: Token ${{ secrets.PA_API_KEY }}")

          if [ "$RESPONSE" == "200" ]; then
            echo "✅ Reload successful!"
          else
            echo "❌ Reload failed with status code: $RESPONSE"
            exit 1
          fi
