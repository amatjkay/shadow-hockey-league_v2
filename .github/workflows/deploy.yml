name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  quality-and-tests:
    name: "Quality & Tests"
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m venv venv
          ./venv/bin/pip install --upgrade pip
          ./venv/bin/pip install -r requirements.txt
          ./venv/bin/pip install -r requirements-dev.txt

      - name: Code Quality Checks (black, isort, flake8, mypy)
        run: make check

      - name: Dependency Security Audit (pip-audit)
        run: make audit-deps

      - name: Run Tests
        env:
          TESTING: "1"
          FLASK_ENV: "testing"
          CACHE_TYPE: "RedisCache"
          REDIS_HOST: "localhost"
        run: make test

  deploy:
    name: "Deploy to Production"
    needs: quality-and-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Upload deploy script
        run: |
          scp -i ~/.ssh/id_ed25519 \
            -o ConnectTimeout=10 \
            -o StrictHostKeyChecking=no \
            scripts/deploy.sh \
            ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }}:/tmp/deploy.sh

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -o ConnectTimeout=10 \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} \
            'chmod +x /tmp/deploy.sh && bash /tmp/deploy.sh'
