name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    # Add Redis service for Prod-Like testing
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests (Prod-Like with Redis & No Rate Limits)
        env:
          TESTING: "1"
          FLASK_ENV: "testing"
          CACHE_TYPE: "RedisCache"
          REDIS_HOST: "localhost"
        run: |
          # Using pytest for speed and better reporting
          python -m pytest tests/ -v --tb=short

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} << 'ENDSSH'
            set -e  # Exit on any error
            cd /home/shleague/shadow-hockey-league_v2

            echo "=== 1. Fetching latest code ==="
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            echo "=== 2. Cleaning Python cache ==="
            find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
            find . -type f -name "*.pyc" -delete 2>/dev/null || true

            echo "=== 3. Updating dependencies ==="
            source venv/bin/activate
            pip install -r requirements.txt --quiet --upgrade

            echo "=== 4. Applying database migrations ==="
            alembic upgrade head || echo "⚠️ Migration failed or already applied"

            echo "=== 5. Restarting application ==="
            systemctl restart shadow-hockey-league
            sleep 2

            echo "=== 6. Verifying deployment ==="
            git log --oneline -1
            systemctl is-active shadow-hockey-league

            echo "✅ Deployment completed successfully!"
          ENDSSH

      - name: Notify success
        run: echo "✅ Деплой успешно завершён!"
