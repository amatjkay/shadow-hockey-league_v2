[tool.black]
line-length = 100
target-version = ['py312']
include = '\.pyi?$'
# Excluded:
#   - vendored upstream skills (`skills/superpowers/`, git submodule pinned at
#     v5.0.7) — formatting is owned by upstream.
#   - `.kilo/` agent stubs (intentional placeholder Python files; keeping them
#     out of black/isort/flake8 lets the agent-config tree drift independently).
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | venv
  | _build
  | buck-out
  | build
  | dist
  | instance
  | migrations
  | scripts/oneoff
  | skills/superpowers
  | \.kilo
)/
'''

[tool.isort]
profile = "black"
line_length = 100
skip = [
    "instance",
    "__pycache__",
    "venv",
    ".venv",
    "migrations",
    "scripts/oneoff",
    # Same rationale as `[tool.black].exclude` — see comment there.
    "skills/superpowers",
    ".kilo",
]
known_first_party = ["app", "data", "config", "models"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
exclude = [
    "^venv/",
    "^\\.venv/",
    "^migrations/",
    "^instance/",
    "^build/",
    "^dist/",
    "^scripts/oneoff/",
    # Same rationale as `[tool.black].exclude` — see comment there.
    "^skills/superpowers/",
    "^\\.kilo/",
]

# Flask-SQLAlchemy uses `db.Model` as a runtime metaclass that mypy cannot resolve
# without the SQLAlchemy 2.0 typed-mapping migration, which would require rewriting
# every model declaration. AGENTS.md forbids touching `models.py` without explicit
# user approval, so we silence the resulting `name-defined` noise at the file level.
[[tool.mypy.overrides]]
module = "models"
disable_error_code = ["name-defined"]

# `app.py` Redis bootstrap mixes `os.environ.get(...)` results (typed as `str | None`)
# into a single `dict[str, str | int | None]`, which makes the redis-py overload check
# fail. The runtime is correct (Redis() accepts None for password). AGENTS.md forbids
# touching `app.py` without explicit user approval, so we silence the overload error
# at the file level.
[[tool.mypy.overrides]]
module = "app"
disable_error_code = ["call-overload"]
