{% extends 'admin/model/edit.html' %}

{% block tail %}
    {{ super() }}

    <!-- Points Calculator Section -->
    <div id="points-calculator" style="margin-top: 20px; padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 8px; color: white;">
        <h4 style="margin-top: 0; margin-bottom: 15px;">🏆 Points Calculator (Preview)</h4>

        <div class="form-group">
            <label>League (for preview)</label>
            <select id="calc-league" class="form-control" style="width: 100%;"></select>
        </div>

        <div class="form-group">
            <label>Season (for preview)</label>
            <select id="calc-season" class="form-control" style="width: 100%;" disabled></select>
        </div>

        <hr style="border-color: rgba(255,255,255,0.3);">

        <div class="row" style="margin-bottom: 10px;">
            <div class="col-md-3">
                <strong>League:</strong>
            </div>
            <div class="col-md-3">
                <span id="calc-league-display">—</span>
            </div>
            <div class="col-md-3">
                <strong>Base Points:</strong>
            </div>
            <div class="col-md-3">
                <span id="calc-base-display">—</span>
            </div>
        </div>

        <div class="row" style="margin-bottom: 10px;">
            <div class="col-md-3">
                <strong>Season:</strong>
            </div>
            <div class="col-md-3">
                <span id="calc-season-display">—</span>
            </div>
            <div class="col-md-3">
                <strong>Multiplier:</strong>
            </div>
            <div class="col-md-3">
                <span id="calc-multiplier-display">—</span>
            </div>
        </div>

        <hr style="border-color: rgba(255,255,255,0.3);">

        <div class="row">
            <div class="col-md-6">
                <strong style="font-size: 18px;">Final Points:</strong>
            </div>
            <div class="col-md-6">
                <span id="calc-final-display" style="font-size: 28px; font-weight: bold;">—</span>
            </div>
        </div>
    </div>

    <script>
    $(document).ready(function() {
        // Load leagues on page load
        loadLeagues();

        // Cascade: League → Season (plain select change event)
        $('#calc-league').on('change', function() {
            var leagueId = $(this).val();
            if (!leagueId) {
                $('#calc-season').val(null).prop('disabled', true).trigger('change');
                $('#calc-season-display').text('—');
                $('#calc-multiplier-display').text('—');
                $('#calc-base-display').text('—');
                $('#calc-league-display').text('—');
                $('#calc-final-display').text('—');
                return;
            }
            loadSeasons(leagueId);
            updateCalculator();
        });

        // Season selection
        $('#calc-season').on('change', function() {
            updateCalculator();
        });

        // Listen to form field changes for base_points_l1/l2
        $('#base_points_l1, #base_points_l2').on('input change', function() {
            updateCalculator();
        });

        function loadLeagues() {
            $.get('/admin/api/leagues', function(data) {
                if (data.items) {
                    $('#calc-league').empty().append('<option value=""></option>');
                    data.items.forEach(function(item) {
                        $('#calc-league').append('<option value="' + item.id + '" data-code="' + item.code + '">' + item.name + ' (' + item.code + ')</option>');
                    });
                }
            }).fail(function() {
                console.error('Failed to load leagues');
            });
        }

        function loadSeasons(leagueId) {
            if (!leagueId) {
                $('#calc-season').empty().append('<option value=""></option>');
                return;
            }
            $.get('/admin/api/seasons', { league_id: leagueId, active_only: true }, function(data) {
                if (data.items) {
                    $('#calc-season').empty().append('<option value=""></option>');
                    data.items.forEach(function(item) {
                        $('#calc-season').append('<option value="' + item.id + '" data-multiplier="' + item.multiplier + '">' + item.name + ' (×' + item.multiplier + ')</option>');
                    });
                }
            }).fail(function() {
                console.error('Failed to load seasons');
            });
        }

        function updateCalculator() {
            var leagueOption = $('#calc-league option:selected');
            var seasonOption = $('#calc-season option:selected');

            if (!leagueOption || !leagueOption.val()) {
                $('#calc-league-display').text('—');
                $('#calc-base-display').text('—');
                $('#calc-season-display').text('—');
                $('#calc-multiplier-display').text('—');
                $('#calc-final-display').text('—');
                return;
            }

            var leagueCode = leagueOption.data('code');
            var leagueText = leagueOption.text();

            // Get base points from form fields
            var basePointsL1 = parseFloat($('#base_points_l1').val()) || 0;
            var basePointsL2 = parseFloat($('#base_points_l2').val()) || 0;
            var basePoints = (leagueCode === '1') ? basePointsL1 : basePointsL2;

            $('#calc-league-display').text(leagueText);
            $('#calc-base-display').text(basePoints);

            if (seasonOption && seasonOption.val()) {
                var multiplier = parseFloat(seasonOption.data('multiplier')) || 1.0;
                var finalPoints = (basePoints * multiplier).toFixed(2);

                $('#calc-season-display').text(seasonOption.text());
                $('#calc-multiplier-display').text('×' + multiplier);
                $('#calc-final-display').text(finalPoints);
            } else {
                $('#calc-season-display').text('—');
                $('#calc-multiplier-display').text('—');
                $('#calc-final-display').text('—');
            }
        }
    });
    </script>

    <style>
    #calc-league, #calc-season {
        background-color: rgba(255,255,255,0.9);
        border: 1px solid rgba(255,255,255,0.3);
        color: #333;
        display: block;
        height: calc(1.5em + 0.75rem + 2px);
        padding: 0.375rem 0.75rem;
        font-size: 1rem;
        font-weight: 400;
        line-height: 1.5;
        background-clip: padding-box;
        border-radius: 0.25rem;
        transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
    }
    #calc-final-display {
        color: #FFD700;
        text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
    }
    </style>
{% endblock %}
