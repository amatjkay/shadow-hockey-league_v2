{% extends 'admin/model/edit.html' %} {% block tail %} {{ super() }}
<script>
  $(document).ready(function () {
    // Simple Select2 for country dropdown (SelectField compatible, no ajax)
    $("#country_id").select2({
      width: "100%",
      placeholder: "Select country...",
    });

    // Auto-fill country code and flag preview on selection
    $("#country_id").on("select2:select", function (e) {
      var data = e.params.data;
      if (data) {
        var match = data.text.match(/\(([^)]+)\)/);
        var code = match ? match[1] : "";
        $("#country_code_display").val(code).trigger("change");
        // Try to get flag from static folder based on code
        if (code) {
          $("#flag_preview_img")
            .attr("src", "/static/img/flags/" + code + ".png")
            .show();
        }
      }
    });

    // Initial load: populate fields if country is already selected
    setTimeout(function () {
      var countrySelect = $("#country_id").select2("data");
      if (countrySelect && countrySelect[0]) {
        var country = countrySelect[0];
        var match = country.text.match(/\(([^)]+)\)/);
        var code = match ? match[1] : "";
        $("#country_code_display").val(code).trigger("change");
        if (code) {
          $("#flag_preview_img")
            .attr("src", "/static/img/flags/" + code + ".png")
            .show();
        }
      }
    }, 500);

    // Style readonly fields
    $("#country_code_display, #flag_path_display")
      .addClass("readonly-field")
      .prop("readonly", true);

    // Tandem detection warning
    $("#name").on("input", function () {
      if (this.value.includes(",")) {
        if (!$("#tandem-warning").length) {
          $(this)
            .closest(".form-group")
            .after(
              '<div id="tandem-warning" class="alert alert-warning mt-2">' +
                "⚠️ <strong>Tandem detected.</strong> Ensure both players represent one country" +
                "</div>",
            );
        }
      } else {
        $("#tandem-warning").remove();
      }
    });

    // Check on page load (if editing existing tandem)
    setTimeout(function () {
      var nameValue = $("#name").val();
      if (nameValue && nameValue.includes(",")) {
        $("#name").trigger("input");
      }
    }, 300);
  });
</script>

<style>
  #country_code_display,
  #flag_path_display {
    max-width: 200px;
    margin-top: 4px;
  }
  #flag_preview_img {
    display: none;
    width: 48px;
    height: 48px;
    border: 1px solid #ddd;
    border-radius: 4px;
    margin-top: 8px;
  }
</style>

<div id="country_code_field" style="display: none; margin-top: 8px">
  <label>Country Code</label>
  <input type="text" id="country_code_display" class="form-control" readonly />
</div>
<div id="flag_preview_field" style="display: none; margin-top: 8px">
  <label>Flag Preview</label>
  <img id="flag_preview_img" src="" alt="Country flag" />
</div>

<!-- ==================== Achievements Section ==================== -->
<hr style="margin-top: 30px" />
<div id="achievements-section">
  <h3>🏆 Achievements</h3>

  <!-- Existing Achievements Table -->
  <table id="achievements-table" class="table table-striped table-bordered">
    <thead>
      <tr>
        <th>Type</th>
        <th>League</th>
        <th>Season</th>
        <th>Base</th>
        <th>Multi</th>
        <th>Points</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="achievements-tbody">
      <tr>
        <td colspan="7" class="text-center text-muted">Loading...</td>
      </tr>
    </tbody>
    <tfoot>
      <tr>
        <td colspan="5"><strong>Total</strong></td>
        <td colspan="2"><strong id="achievements-total">0.00</strong></td>
      </tr>
    </tfoot>
  </table>

  <button type="button" id="add-achievement-btn" class="btn btn-primary btn-sm">
    ➕ Add Achievement
  </button>
</div>

<!-- Pending Achievements Table -->
<table
  id="pending-achievements-table"
  class="table table-warning"
  style="margin-top: 10px; display: none"
>
  <thead>
    <tr>
      <th>Type</th>
      <th>League</th>
      <th>Season</th>
      <th>Points</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="pending-achievements-tbody"></tbody>
</table>

<!-- Add Achievement Modal -->
<div class="modal fade" id="achievement-modal" tabindex="-1" role="dialog">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Add Achievement</h5>
        <button type="button" class="close" data-dismiss="modal">
          &times;
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Type *</label>
          <select
            id="ach-type"
            class="form-control"
            style="width: 100%"
          ></select>
        </div>
        <div class="form-group">
          <label>League *</label>
          <select
            id="ach-league"
            class="form-control"
            style="width: 100%"
          ></select>
        </div>
        <div class="form-group">
          <label>Season *</label>
          <select
            id="ach-season"
            class="form-control"
            style="width: 100%"
            disabled
          ></select>
        </div>
        <div class="form-group">
          <label>Points (auto-calculated)</label>
          <input type="text" id="ach-points" class="form-control" readonly />
        </div>
        <div
          id="ach-duplicate-warning"
          class="alert alert-warning"
          style="display: none"
        >
          ⚠️ This achievement already exists for this manager.
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" id="ach-add-btn" class="btn btn-success">
          ➕ Add Another
        </button>
        <button
          type="button"
          id="ach-save-all-btn"
          class="btn btn-primary"
          disabled
        >
          💾 Save All
        </button>
        <button type="button" class="btn btn-secondary" data-dismiss="modal">
          Cancel
        </button>
      </div>
    </div>
  </div>
</div>

<script>
  (function() {
      var managerId = {{ model.id }};
      var pendingAchievements = [];
      var existingAchievements = [];

      // Load existing achievements
      loadAchievements();

      function loadAchievements() {
          $.get('/admin/api/managers/' + managerId + '/achievements', function(data) {
              existingAchievements = data.achievements;
              var tbody = $('#achievements-tbody').empty();

              if (data.achievements.length === 0) {
                  tbody.html('<tr><td colspan="7" class="text-center text-muted">No achievements yet. Click "Add Achievement" to create one.</td></tr>');
              } else {
                  data.achievements.forEach(function(ach) {
                      var finalPoints = (ach.final_points || 0).toFixed(2);
                      tbody.append('<tr data-id="' + ach.id + '">' +
                          '<td>' + (ach.type.code || '') + ' (' + (ach.type.name || '') + ')</td>' +
                          '<td>' + (ach.league.code || '') + ' (' + (ach.league.name || '') + ')</td>' +
                          '<td>' + (ach.season.code || '') + ' (' + (ach.season.name || '') + ')</td>' +
                          '<td>' + (ach.base_points || 0) + '</td>' +
                          '<td>×' + (ach.multiplier || 1) + '</td>' +
                          '<td><strong>' + finalPoints + '</strong></td>' +
                          '<td><button class="btn btn-sm btn-danger delete-ach-btn" data-id="' + ach.id + '">❌ Delete</button></td>' +
                      '</tr>');
                  });
              }
              $('#achievements-total').text(data.total_points.toFixed(2));
          }).fail(function() {
              $('#achievements-tbody').html('<tr><td colspan="7" class="text-center text-danger">Failed to load achievements</td></tr>');
          });
      }

      // Initialize Select2 dropdowns in modal
      initSelect2Dropdowns();

      function initSelect2Dropdowns() {
          // Type - no Select2, use plain select
          // $('#ach-type').select2(); // DISABLED - Select2 causing ajax errors

          // League - no Select2, use plain select
          // $('#ach-league').select2(); // DISABLED - Select2 causing ajax errors

          // Season (cascaded) - no Select2, use plain select
          // $('#ach-season').select2(); // DISABLED - Select2 causing ajax errors

          // Cascade: league -> season (plain select change event)
          $('#ach-league').on('change', function() {
              var leagueId = $(this).val();
              loadSeasons(leagueId);
              calculatePoints();
          });

          // Load options when modal opens
          $('#add-achievement-btn').on('click', function() {
              loadAchievementTypes();
              loadLeagues();
          });
      }

      function loadAchievementTypes() {
          $.get('/admin/api/achievement-types', function(data) {
              if (data.items) {
                  $('#ach-type').empty().append('<option value=""></option>');
                  data.items.forEach(function(item) {
                      $('#ach-type').append('<option value="' + item.id + '">' + item.text + '</option>');
                  });
              }
          }).fail(function() {
              console.error('Failed to load achievement types');
          });
      }

      function loadLeagues() {
          $.get('/admin/api/leagues', function(data) {
              if (data.items) {
                  $('#ach-league').empty().append('<option value=""></option>');
                  data.items.forEach(function(item) {
                      $('#ach-league').append('<option value="' + item.id + '">' + item.name + ' (' + item.code + ')</option>');
                  });
              }
          }).fail(function() {
              console.error('Failed to load leagues');
          });
      }

      function loadSeasons(leagueId) {
          if (!leagueId) {
              $('#ach-season').empty().append('<option value=""></option>');
              return;
          }
          $.get('/admin/api/seasons', { league_id: leagueId, active_only: true }, function(data) {
              if (data.items) {
                  $('#ach-season').empty().append('<option value=""></option>');
                  data.items.forEach(function(item) {
                      $('#ach-season').append('<option value="' + item.id + '" data-multiplier="' + item.multiplier + '">' + item.name + ' (×' + item.multiplier + ')</option>');
                  });
              }
          }).fail(function() {
              console.error('Failed to load seasons');
          });

          // Recalculate on any selection change (plain select change event)
          $('#ach-type, #ach-season').on('change', function() { calculatePoints(); });
      }

      function calculatePoints() {
          var typeId = $('#ach-type').val();
          var leagueId = $('#ach-league').val();
          var seasonId = $('#ach-season').val();
          if (!typeId || !leagueId || !seasonId) {
              $('#ach-points').val('');
              return;
          }

          // Get multiplier from selected season option
          var seasonOption = $('#ach-season option:selected');
          var multiplier = seasonOption.data('multiplier') || 1.0;

          $.get('/admin/api/achievement-types/' + typeId + '/points', { league_id: leagueId }, function(typeData) {
              var base = typeData.base_points;
              var mult = multiplier;
              var final = (base * mult).toFixed(2);
              $('#ach-points').val(final);
          });
          checkDuplicate();
      }

      function checkDuplicate() {
          var typeId = parseInt($('#ach-type').val());
          var leagueId = parseInt($('#ach-league').val());
          var seasonId = parseInt($('#ach-season').val());

          if (!typeId || !leagueId || !seasonId) {
              $('#ach-duplicate-warning').hide();
              return;
          }

          var isDuplicate = existingAchievements.some(function(ach) {
              return ach.type.id === typeId && ach.league.id === leagueId && ach.season.id === seasonId;
          });

          if (isDuplicate) {
              $('#ach-duplicate-warning').show();
          } else {
              $('#ach-duplicate-warning').hide();
          }
      }

      // Open modal
      $('#add-achievement-btn').on('click', function() {
          $('#achievement-modal').modal('show');
      });

      // Add Another
      $('#ach-add-btn').on('click', function() {
          var typeId = $('#ach-type').val();
          var leagueId = $('#ach-league').val();
          var seasonId = $('#ach-season').val();
          var points = parseFloat($('#ach-points').val());

          if (!typeId || !leagueId || !seasonId) {
              alert('Please fill all fields');
              return;
          }

          // Check duplicate in pending
          var isPendingDup = pendingAchievements.some(function(p) {
              return p.type_id === parseInt(typeId) && p.league_id === parseInt(leagueId) && p.season_id === parseInt(seasonId);
          });

          if (isPendingDup) {
              alert('This achievement is already in the pending list.');
              return;
          }

          // Get display text from plain select options
          var typeText = $('#ach-type option:selected').text();
          var leagueText = $('#ach-league option:selected').text();
          var seasonText = $('#ach-season option:selected').text();

          pendingAchievements.push({
              type_id: parseInt(typeId),
              league_id: parseInt(leagueId),
              season_id: parseInt(seasonId),
              type_text: typeText || typeId,
              league_text: leagueText || leagueId,
              season_text: seasonText || seasonId,
              points: points || 0
          });

          renderPendingAchievements();
          clearModalForm();
      });

      function renderPendingAchievements() {
          var tbody = $('#pending-achievements-tbody').empty();
          if (pendingAchievements.length === 0) {
              $('#pending-achievements-table').hide();
              $('#ach-save-all-btn').prop('disabled', true);
              return;
          }
          $('#pending-achievements-table').show();
          $('#ach-save-all-btn').prop('disabled', false);
          pendingAchievements.forEach(function(ach, idx) {
              tbody.append('<tr data-idx="' + idx + '">' +
                  '<td>' + ach.type_text + '</td>' +
                  '<td>' + ach.league_text + '</td>' +
                  '<td>' + ach.season_text + '</td>' +
                  '<td><strong>' + ach.points.toFixed(2) + '</strong></td>' +
                  '<td><button class="btn btn-sm btn-danger remove-pending-btn" data-idx="' + idx + '">❌</button></td>' +
              '</tr>');
          });
      }

      function clearModalForm() {
          $('#ach-type').val(null).trigger('change');
          $('#ach-league').val(null).trigger('change');
          $('#ach-season').val(null).trigger('change').prop('disabled', true);
          $('#ach-points').val('');
          $('#ach-duplicate-warning').hide();
      }

      // Remove pending row
      $(document).on('click', '.remove-pending-btn', function() {
          var idx = parseInt($(this).data('idx'));
          pendingAchievements.splice(idx, 1);
          renderPendingAchievements();
      });

      // Save All
      $('#ach-save-all-btn').on('click', function() {
          if (pendingAchievements.length === 0) {
              alert('No achievements to save. Use "Add Another" first.');
              return;
          }

          var btn = $(this).prop('disabled', true).text('⏳ Saving...');

          $.ajax({
              url: '/admin/api/managers/' + managerId + '/achievements/bulk-add',
              method: 'POST',
              contentType: 'application/json',
              data: JSON.stringify({ achievements: pendingAchievements }),
              success: function(response) {
                  var msg = '✅ Created: ' + response.summary.created;
                  if (response.summary.skipped_duplicates > 0) {
                      msg += '\n⚠️ Skipped (duplicates): ' + response.summary.skipped_duplicates;
                  }
                  if (response.summary.errors > 0) {
                      msg += '\n❌ Errors: ' + response.summary.errors;
                      response.summary.errors.forEach(function(e) {
                          msg += '\n  - ' + e.error;
                      });
                  }
                  alert(msg);
                  pendingAchievements = [];
                  renderPendingAchievements();
                  loadAchievements();
                  $('#achievement-modal').modal('hide');
              },
              error: function(xhr) {
                  var err = xhr.responseJSON && xhr.responseJSON.error ? xhr.responseJSON.error : 'Unknown error';
                  alert('❌ Failed to save: ' + err);
              },
              complete: function() {
                  btn.prop('disabled', false).text('💾 Save All');
              }
          });
      });

      // Delete existing achievement
      $(document).on('click', '.delete-ach-btn', function() {
          if (!confirm('Delete this achievement?')) return;
          var achId = $(this).data('id');
          var row = $(this).closest('tr');

          $.ajax({
              url: '/admin/api/managers/' + managerId + '/achievements/' + achId,
              method: 'DELETE',
              success: function(response) {
                  row.remove();
                  $('#achievements-total').text(response.manager_total_points.toFixed(2));
                  // Remove from existing list
                  existingAchievements = existingAchievements.filter(function(a) { return a.id !== achId; });
              },
              error: function(xhr) {
                  alert('Failed to delete: ' + (xhr.responseJSON && xhr.responseJSON.error || 'Unknown error'));
              }
          });
      });
  })();
</script>

<style>
  #achievements-section {
    margin-top: 20px;
    padding: 15px;
    background: #f9f9f9;
    border-radius: 8px;
    border: 1px solid #e0e0e0;
  }
  #achievements-table {
    background: white;
    border-radius: 4px;
  }
  #pending-achievements-table {
    border-radius: 4px;
  }
  .delete-ach-btn,
  .remove-pending-btn {
    padding: 2px 8px;
    font-size: 12px;
  }
</style>
{% endblock %}
