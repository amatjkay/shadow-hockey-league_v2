{% extends 'admin/model/edit.html' %} 

{% block tail %} 
{{ super() }}
<script>
  // Global Manager ID from Jinja
  const MANAGER_ID = {{ model.id if model else 'null' }};
  
  // Cache and state
  let typesCache = [];
  let leaguesCache = [];
  let seasonsCache = {};
  let existingAchievements = [];

  // Define functions globally
  window.loadAchievements = function() {
    console.log('Loading achievements for manager:', MANAGER_ID);
    if (!MANAGER_ID) return;
    $.get(`/admin/api/managers/${MANAGER_ID}/achievements`)
      .done(function(res) {
        console.log('Achievements loaded:', res);
        existingAchievements = res.achievements || [];
        window.renderAchievements(existingAchievements);
        $('#ach-total-points').text(`Total: ${res.total_points.toFixed(2)} points`);
      })
      .fail(xhr => console.error('Failed to load achievements', xhr));
  };

  window.renderAchievements = function(list) {
    list.sort((a, b) => b.final_points - a.final_points);
    $('#ach-count').text(list.length);
    const tbody = $('#achievements-body');
    tbody.empty();

    if (list.length === 0) {
      tbody.append('<tr><td colspan="6" class="text-center text-muted">No achievements yet. Click "Add Achievement" to create one.</td></tr>');
      return;
    }

    list.forEach(ach => {
      const iconPath = ach.icon_path || `/static/img/cups/${ach.type.code.toLowerCase()}.svg`;
      tbody.append(`
        <tr data-id="${ach.id}">
          <td class="text-center"><img src="${iconPath}" class="ach-icon-sm" onerror="this.src='/static/img/cups/default.svg'"></td>
          <td>${ach.type.name} (${ach.type.code})</td>
          <td>${ach.league.name}</td>
          <td>${ach.season.name}</td>
          <td><strong>${ach.final_points.toFixed(2)}</strong></td>
          <td>
            <button type="button" class="btn btn-sm btn-danger del-btn" data-id="${ach.id}" title="Delete achievement">
              <i class="fa fa-trash"></i>
            </button>
          </td>
        </tr>
      `);
    });
  };

  window.deleteAchievement = function(id) {
    console.log('Deleting achievement:', id);
    if (!id) return;
    
    // In E2E environment, we might want to bypass confirm or handle it
    // For now, let's keep it but handle it in the subagent.
    if (window.confirm_bypass || confirm('Are you sure you want to delete this achievement?')) {
      const $btn = $(`.del-btn[data-id="${id}"]`);
      const originalText = $btn.html();
      $btn.prop('disabled', true).html('<i class="fa fa-spinner fa-spin"></i>');

      $.ajax({
        url: `/admin/api/managers/${MANAGER_ID}/achievements/${id}`,
        method: 'DELETE'
      }).done(res => {
        console.log('Deleted successfully:', res);
        window.loadAchievements();
      }).fail(xhr => {
        console.error('Deletion failed:', xhr);
        alert('Failed to delete: ' + (xhr.responseJSON?.error || 'Unknown error'));
        $btn.prop('disabled', false).html(originalText);
      });
    }
  };

  window.openAchievementModal = function() {
    $('#achModalTitle').text('Add Achievement');
    $('#ach-id').val('');
    $('#ach-form')[0].reset();
    $('#ach-season-id').prop('disabled', true).empty().append('<option value="">-- Select --</option>');
    $('#points-preview-row').hide();
    $('#ach-duplicate-warning').hide();
    $('#achievementModal').modal('show');
  };

  window.saveAchievement = function() {
    const tid = $('#ach-type-id').val();
    const lid = $('#ach-league-id').val();
    const sid = $('#ach-season-id').val();

    if (!tid || !lid || !sid) {
      alert('Please fill all required fields');
      return;
    }

    const data = {
      achievements: [{
        type_id: parseInt(tid),
        league_id: parseInt(lid),
        season_id: parseInt(sid)
      }]
    };

    console.log('Saving achievement:', data);
    const $btn = $('#ach-save-btn').prop('disabled', true).text('Saving...');

    $.ajax({
      url: `/admin/api/managers/${MANAGER_ID}/achievements/bulk-add`,
      method: 'POST',
      contentType: 'application/json',
      data: JSON.stringify(data)
    }).done(res => {
      console.log('Saved successfully:', res);
      if (res.success && res.summary.created > 0) {
        window.loadAchievements();
        $('#achievementModal').modal('hide');
      } else if (res.summary.skipped_duplicates > 0) {
        alert('Achievement already exists!');
      } else {
        alert('Failed to save achievement');
      }
    }).fail(xhr => {
      console.error('Save failed:', xhr);
      alert('Error: ' + (xhr.responseJSON?.error || 'Unknown error'));
    }).always(() => {
      $btn.prop('disabled', false).text('Save');
    });
  };

  $(document).ready(function () {
    // Select2 for country dropdown
    if ($.fn.select2) {
      $("#country_id").select2({ width: "100%", placeholder: "Select country..." });
      
      $("#country_id").on("select2:select", function (e) {
        var code = e.params.data.text.match(/\(([^)]+)\)/)?.[1] || "";
        $("#country_code_display").val(code);
        if (code) $("#flag_preview_img").attr("src", "/static/img/flags/" + code.toUpperCase() + ".png").show();
      });
    }

    // Style readonly fields
    $("#country_code_display, #flag_path_display").addClass("readonly-field").prop("readonly", true);

    // Tandem warning
    $("#name").on("input", function () {
      if (this.value.includes(",")) {
        if (!$("#tandem-warning").length) {
          $(this).closest(".form-group").after('<div id="tandem-warning" class="alert alert-warning mt-2">⚠️ Tandem detected.</div>');
        }
      } else { $("#tandem-warning").remove(); }
    }).trigger('input');

    // Achievements Initialization
    if (MANAGER_ID) {
      window.loadAchievements();
      
      // Delegation for dynamic delete buttons
      $('#achievements-body').on('click', '.del-btn', function(e) {
        e.preventDefault();
        const id = $(this).data('id');
        if (id) window.deleteAchievement(id);
      });

      // Load dropdowns
      $.get('/admin/api/achievement-types').done(res => {
        populateSelect('#ach-type-id', res.items || [], i => ({id: i.id, text: i.text}));
      });
      $.get('/admin/api/leagues').done(res => {
        populateSelect('#ach-league-id', res.items || [], l => ({id: l.id, text: l.name}));
      });
    }

    // Modal behavior
    $('#ach-league-id').on('change', function() {
      const lid = $(this).val();
      const $sid = $('#ach-season-id').prop('disabled', true).empty().append('<option value="">-- Select --</option>');
      $('#points-preview-row').hide();
      if (!lid) return;
      $.get('/admin/api/seasons', { league_id: lid, active_only: false }).done(res => {
        populateSelect('#ach-season-id', res.items || [], s => ({id: s.id, text: s.name}));
        $sid.prop('disabled', false);
      });
    });

    $('#ach-type-id, #ach-league-id, #ach-season-id').on('change', updatePreview);

    function populateSelect(selector, data, mapper) {
      const $el = $(selector);
      $el.empty().append('<option value="">-- Select --</option>');
      data.forEach(item => {
        const opt = mapper(item);
        $el.append(`<option value="${opt.id}">${opt.text}</option>`);
      });
    }

    function updatePreview() {
      const tid = $('#ach-type-id').val();
      const lid = $('#ach-league-id').val();
      const sid = $('#ach-season-id').val();
      if (!tid || !lid || !sid) { $('#points-preview-row').hide(); return; }
      $.get('/admin/api/calculate-points', { type_id: tid, league_id: lid, season_id: sid }).done(res => {
        $('#ach-preview-base').text(res.base_points);
        $('#ach-preview-mult').text('×' + res.multiplier);
        $('#ach-preview-final').text(res.final_points.toFixed(2));
        $('#points-preview-row').show();
        const isDup = existingAchievements.some(a => a.type.id == tid && a.league.id == lid && a.season.id == sid);
        $('#ach-duplicate-warning').toggle(isDup);
      });
    }
  });
</script>

<style>
  #country_code_display,
  #flag_path_display {
    max-width: 200px;
    margin-top: 4px;
  }
  #flag_preview_img {
    display: none;
    width: 48px;
    height: 48px;
    border: 1px solid #ddd;
    border-radius: 4px;
    margin-top: 8px;
  }
  
  /* Achievements Section Styles */
  #achievements-section {
    margin-top: 30px;
    padding: 20px;
    background: #fdfdfd;
    border-radius: 8px;
    border: 1px solid #eee;
  }
  .points-preview {
    font-size: 1.2em;
    font-weight: bold;
    color: #28a745;
  }
  .ach-icon-sm {
    height: 24px;
    margin-right: 8px;
  }
</style>

<div id="country_code_field" style="display: none; margin-top: 8px">
  <label>Country Code</label>
  <input type="text" id="country_code_display" class="form-control" readonly />
</div>
<div id="flag_preview_field" style="display: none; margin-top: 8px">
  <label>Flag Preview</label>
  <img id="flag_preview_img" src="" alt="Country flag" />
</div>

<!-- ==================== Achievements Section ==================== -->
<div id="achievements-section">
  <h3>🏆 Achievements <span id="ach-count" class="badge badge-secondary">0</span></h3>
  <div style="margin-bottom: 15px;">
    <button type="button" class="btn btn-sm btn-success" onclick="window.openAchievementModal()">
      <i class="fa fa-plus"></i> Add Achievement
    </button>
    <span id="ach-total-points" style="margin-left: 15px; font-weight: bold; color: #333; font-size: 1.1em;">
      Total: 0.00 points
    </span>
  </div>
  
  <div class="table-responsive">
    <table class="table table-striped table-hover table-sm" id="achievements-table">
      <thead>
        <tr>
          <th>Icon</th>
          <th>Type</th>
          <th>League</th>
          <th>Season</th>
          <th>Points</th>
          <th style="width: 80px;">Action</th>
        </tr>
      </thead>
      <tbody id="achievements-body">
        <tr><td colspan="6" class="text-center text-muted">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Modal for Add/Edit -->
<div class="modal fade" id="achievementModal" tabindex="-1" role="dialog">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="achModalTitle">Add Achievement</h5>
        <button type="button" class="close" data-dismiss="modal">&times;</button>
      </div>
      <div class="modal-body">
        <form id="ach-form">
          <input type="hidden" id="ach-id">
          <div class="form-group">
            <label>Type *</label>
            <select id="ach-type-id" class="form-control" required></select>
          </div>
          <div class="form-group">
            <label>League *</label>
            <select id="ach-league-id" class="form-control" required></select>
          </div>
          <div class="form-group">
            <label>Season *</label>
            <select id="ach-season-id" class="form-control" required disabled></select>
          </div>
          <hr>
          <div class="row text-center" id="points-preview-row" style="display: none;">
            <div class="col-4">
              <small class="text-muted">Base</small><br>
              <span id="ach-preview-base">-</span>
            </div>
            <div class="col-4">
              <small class="text-muted">Multiplier</small><br>
              <span id="ach-preview-mult">-</span>
            </div>
            <div class="col-4">
              <small class="text-muted">Final</small><br>
              <span id="ach-preview-final" class="points-preview">-</span>
            </div>
          </div>
          <div id="ach-duplicate-warning" class="alert alert-warning mt-2" style="display: none;">
            ⚠️ This achievement already exists for this manager.
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="ach-save-btn" onclick="window.saveAchievement()">Save</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}
