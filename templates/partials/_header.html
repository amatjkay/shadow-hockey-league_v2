<header class="header">
        <div class="header-items">
          <a
            href="https://t.me/+N72ozSs2bD82Yjdi"
            target="_blank"
            rel="noopener noreferrer"
          >
            <img
              src="{{ url_for('static', filename='img/social/telegram.png') }}"
              alt="Telegram"
              width="40"
              height="40"
              decoding="async"
            />
          </a>
          <img
            src="{{ url_for('static', filename='img/logo.png') }}"
            alt="Логотип Shadow Hockey League"
            class="img-fluid header-logo"
            width="40"
            height="40"
            decoding="async"
          />
          <button
            type="button"
            class="theme-toggle"
            data-theme-toggle
            aria-label="Переключить тему"
            aria-pressed="false"
          >
            <span class="theme-toggle__icon" aria-hidden="true">☀</span>
          </button>
          {% if current_user.is_authenticated %}
          <nav class="desktop-nav">
            <a
              href="{{ url_for('admin.index') }}"
              class="desktop-nav-link"
              >Админ-панель</a
            >
            <a
              href="{{ url_for('admin.logout') }}"
              class="desktop-nav-link"
              >Выйти ({{ current_user.username }})</a
            >
          </nav>
          {% endif %}
        </div>
      </header>
      <div class="header-sentinel" aria-hidden="true"></div>

      <div class="mobile-menu">
        <button class="mobile-menu-button" aria-label="Открыть меню">☰</button>
        <div class="mobile-menu-content">
          <button class="close-button" aria-label="Закрыть меню">
            &times;
          </button>
          <div class="mobile-menu-logos">
            <a
              href="https://t.me/+N72ozSs2bD82Yjdi"
              target="_blank"
              rel="noopener noreferrer"
            >
              <img
                src="{{ url_for('static', filename='img/social/telegram.png') }}"
                alt="Telegram"
                width="35"
                height="35"
                loading="lazy"
                decoding="async"
              />
            </a>
            <img
              src="{{ url_for('static', filename='img/logo.png') }}"
              alt="Логотип Shadow Hockey League"
              class="img-fluid header-logo"
              width="40"
              height="40"
              loading="lazy"
              decoding="async"
            />
          </div>
          <div class="mobile-menu-actions">
            <button
              type="button"
              class="theme-toggle theme-toggle--mobile"
              data-theme-toggle
              aria-label="Переключить тему"
              aria-pressed="false"
            >
              <span class="theme-toggle__icon" aria-hidden="true">☀</span>
              <span class="theme-toggle__label">Тема</span>
            </button>
          </div>
          {% if current_user.is_authenticated %}
          <nav class="mobile-menu-nav">
            <a href="{{ url_for('admin.index') }}" class="mobile-menu-link"
              >Админ-панель</a
            >
            <a
              href="{{ url_for('admin.logout') }}"
              class="mobile-menu-link"
              >Выйти ({{ current_user.username }})</a
            >
          </nav>
          {% endif %}
          <div class="mobile-menu-footer">
            <div class="copyright">© Hockey Shadow League</div>
            <div class="mobile-menu-creators">
              Создано в 2021 году<br />
              <a target="_blank" href="https://t.me/amaTiiKii">@Алексеем</a>
              <a target="_blank" href="https://t.me/whiplash92"
                >@Константином</a
              >
            </div>
          </div>
        </div>
      </div>
