    <script>
      /* FOUC-fix: apply persisted theme before first paint (TIK-84).
         Reads localStorage('shl-theme'); when set, mirrors the value
         on `<html data-theme>` so CSS can pick the matching token
         bundle synchronously. When absent, CSS falls back to
         `prefers-color-scheme`. */
      (function () {
        try {
          var t = localStorage.getItem("shl-theme");
          if (t === "light" || t === "dark") {
            document.documentElement.setAttribute("data-theme", t);
          }
        } catch (e) {
          /* localStorage unavailable (private mode) — ignore. */
        }
      })();
    </script>
